<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Niña ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#000000,#250014,#4d002e);
}

h1{
    color:#ff4d6d;
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 15px #ff4d6d;
    animation:latido 1.5s infinite;
    z-index:2;
}

.contenedor-corazon{
    position:relative;
    width:min(450px,90vw);
    height:min(450px,90vw);
    animation:flotar 4s ease-in-out infinite;
    z-index:2;
}

.corazon{
    position:absolute;
    transform:translate(-50%,-50%);
    font-size:14px;
    animation:latidoPequeno 1.5s infinite;
    text-shadow:0 0 10px #ff4d6d;
}

.mensajes{
    text-align:center;
    margin-top:10px;
    z-index:2;
}

.mensajes p{
    color:#ffd6e0;
    font-size:1.2rem;
    margin:8px 0;
    text-shadow:0 0 10px #ff4d6d;
}

.boton{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    font-size:1rem;
    box-shadow:0 0 15px #ff4d6d;
    animation:latido 1.5s infinite;
}

.boton:hover{
    background:#ff1f55;
}

.estrella{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 10px white;
    animation:caer 5s linear forwards;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

@keyframes latidoPequeno{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.25);}
}

@keyframes flotar{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

@keyframes caer{
    from{
        transform:translateY(-20px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>❤️ Para la niña más hermosa ❤️</h1>

<div class="contenedor-corazon" id="contenedor"></div>

<div class="mensajes">
    <p>🥰 Eres lo mejor que me ha pasado</p>
    <p>✨ Gracias por existir</p>
    <p>💖 Te quiero muchísimo</p>
</div>

<button class="boton" onclick="activarMusica()">
🎵 Toca aquí mi amor
</button>

<audio id="musica" loop>
    <!-- Cambia este archivo por tu MP3 favorito -->
    <source src="musica-romantica.mp3" type="audio/mpeg">
</audio>

<script>

const contenedor = document.getElementById("contenedor");
const cantidad = 250;
const escala = 12;

function coordenadasCorazon(t){
    return{
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)
          -5*Math.cos(2*t)
          -2*Math.cos(3*t)
          -Math.cos(4*t)
    };
}

for(let i=0;i<cantidad;i++){

    const t=(i/cantidad)*2*Math.PI;

    const {x,y}=coordenadasCorazon(t);

    const corazon=document.createElement("div");

    corazon.className="corazon";
    corazon.innerHTML="❤️";

    corazon.style.left=
        `${50+(x*escala/450)*100}%`;

    corazon.style.top=
        `${50-(y*escala/450)*100}%`;

    corazon.style.animationDelay=
        `${Math.random()*1.5}s`;

    contenedor.appendChild(corazon);
}

function activarMusica(){

    const musica=document.getElementById("musica");

    musica.volume=0.4;

    musica.play()
    .then(()=>{
        document.querySelector(".boton")
        .style.display="none";
    })
    .catch(()=>{
        alert("Agrega un archivo llamado 'musica-romantica.mp3' junto al HTML.");
    });
}

function crearEstrella(){

    const estrella=document.createElement("div");

    estrella.className="estrella";

    estrella.style.left=
        Math.random()*100+"%";

    document.body.appendChild(estrella);

    setTimeout(()=>{
        estrella.remove();
    },5000);
}

setInterval(crearEstrella,200);

</script>

</body>
</html>
