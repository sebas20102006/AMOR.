<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #000000, #2b001a, #4b002e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff0054;
            animation: latido 1.5s ease-in-out infinite;
            z-index: 2;
            text-align: center;
        }
        .contenedor-corazon {
            position: relative;
            width: 450px;
            height: 450px;
            animation: flotar 4s ease-in-out infinite;
            z-index: 2;
        }
        .corazon {
            position: absolute;
            color: #ff4d6d;
            font-size: 14px;
            text-shadow: 0 0 8px #ff4d6d;
            animation: latido-pequeno 1.5s ease-in-out infinite;
        }
        .mensajes {
            margin-top: 1rem;
            text-align: center;
            z-index: 2;
        }
        .mensajes p {
            color: #ffd6e0;
            font-size: 1.4rem;
            margin: 0.5rem 0;
            text-shadow: 0 0 10px #ff4d6d;
            animation: aparecer 2s ease-in-out infinite alternate;
        }
        @keyframes latido {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        @keyframes latido-pequeno {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        @keyframes flotar {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes aparecer {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .estrella {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4d6d;
            animation: caer 5s linear infinite;
        }
        @keyframes caer {
            0% { transform: translateY(-10px); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        audio {
            position: fixed;
            bottom: 20px;
            opacity: 0.6;
            z-index: 10;
            width: 250px;
        }
    </style>
</head>
<body>
    <h1>❤️ Para la niña más hermosa ❤️</h1>
    <div class="contenedor-corazon" id="contenedor"></div>
    <div class="mensajes">
        <p>🥰 Eres lo mejor que me ha pasado</p>
        <p>✨ Te quiero muchísimo</p>
        <p>💖 Siempre serás mi niña</p>
    </div>

    <!-- 🎶 MÚSICA NUEVA, ROMÁNTICA Y BONITA 🎶 -->
    <audio autoplay loop controls>
        <source src="https://assets.mixkit.co/music/preview/mixkit-romantic-piano-1168.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    

    <script>
        const contenedor = document.getElementById('contenedor');
        const cantidad = 220;
        const escala = 14;

        function obtenerCoordenadas(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x, y };
        }

        for (let i = 0; i < cantidad; i++) {
            let t = (i / cantidad) * 2 * Math.PI;
            let { x, y } = obtenerCoordenadas(t);

            const corazon = document.createElement('div');
            corazon.className = 'corazon';
            corazon.innerHTML = '❤️';
            corazon.style.left = `calc(50% + ${x * escala}px)`;
            corazon.style.top = `calc(50% - ${y * escala}px)`;
            corazon.style.animationDelay = `${Math.random() * 1.5}s`;

            contenedor.appendChild(corazon);
        }

        function crearEstrellas() {
            setInterval(() => {
                let e = document.createElement('div');
                e.classList.add('estrella');
                e.style.left = Math.random() * 100 + '%';
                e.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(e);
                setTimeout(() => e.remove(), 5000);
            }, 150);
        }
        crearEstrellas();
    </script>
</body>
</html>
