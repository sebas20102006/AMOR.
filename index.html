<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Para Mi Niña ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000000,#2b001a,#4b002e);
    font-family:Arial,sans-serif;
}

h1{
    color:#ff4d6d;
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 20px #ff4d6d;
    animation:latido 1.5s infinite;
    z-index:2;
}

.contenedor-corazon{
    position:relative;
    width:min(450px,90vw);
    height:min(450px,90vw);
    animation:flotar 4s ease-in-out infinite;
}

.corazon{
    position:absolute;
    transform:translate(-50%,-50%);
    font-size:15px;
    text-shadow:0 0 10px #ff4d6d;
    animation:latidoPequeno 1.5s infinite;
}

.mensajes{
    text-align:center;
    margin-top:10px;
    z-index:2;
}

.mensajes p{
    color:#ffd6e0;
    font-size:1.2rem;
    margin:8px;
    text-shadow:0 0 10px #ff4d6d;
}

.boton{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:40px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    font-size:1rem;
    box-shadow:0 0 20px #ff4d6d;
    transition:.3s;
}

.boton:hover{
    transform:scale(1.05);
    background:#ff0054;
}

.estrella{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px white;
    animation:caer 5s linear forwards;
}

.corazon-volador{
    position:fixed;
    font-size:30px;
    pointer-events:none;
    animation:volar 3s linear forwards;
    z-index:9999;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

@keyframes latidoPequeno{
    0%,100%{
        transform:translate(-50%,-50%) scale(1);
    }
    50%{
        transform:translate(-50%,-50%) scale(1.25);
    }
}

@keyframes flotar{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

@keyframes caer{
    from{
        transform:translateY(-20px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@keyframes volar{
    0%{
        transform:translateY(0) scale(1) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:
        translateY(-700px)
        translateX(calc((var(--direccion))*120px))
        scale(2)
        rotate(360deg);

        opacity:0;
    }
}
</style>
</head>

<body>

<h1>❤️ Para la niña más hermosa ❤️</h1>

<div class="contenedor-corazon" id="contenedor"></div>

<div class="mensajes">
    <p>🥰 Eres lo mejor que me ha pasado</p>
    <p>✨ Gracias por existir</p>
    <p>💖 Te quiero muchísimo</p>
    <p>🌹 Siempre tendrás un lugar especial en mi corazón</p>
</div>

<button class="boton" onclick="lluviaCorazones()">
💗 Enviarte Amor 💗
</button>

<script>

// CORAZÓN GRANDE FORMADO POR CORAZONES

const contenedor = document.getElementById("contenedor");
const cantidad = 260;
const escala = 12;

function obtenerCoordenadas(t){

    return{
        x:16*Math.pow(Math.sin(t),3),

        y:13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t)
    };
}

for(let i=0;i<cantidad;i++){

    const t=(i/cantidad)*2*Math.PI;

    const punto=obtenerCoordenadas(t);

    const corazon=document.createElement("div");

    corazon.className="corazon";
    corazon.innerHTML="❤️";

    corazon.style.left=
    `${50+(punto.x*escala/450)*100}%`;

    corazon.style.top=
    `${50-(punto.y*escala/450)*100}%`;

    corazon.style.animationDelay=
    `${Math.random()*1.5}s`;

    contenedor.appendChild(corazon);
}

// LLUVIA DE CORAZONES

function lluviaCorazones(){

    const emojis = [
        "💗","💖","💕","💞","💓",
        "❤️","💘","💝","🥰","😍"
    ];

    for(let i=0;i<50;i++){

        setTimeout(()=>{

            const corazon =
            document.createElement("div");

            corazon.className =
            "corazon-volador";

            corazon.innerHTML =
            emojis[Math.floor(
                Math.random()*emojis.length
            )];

            corazon.style.left =
            Math.random()*100 + "vw";

            corazon.style.bottom = "0px";

            corazon.style.setProperty(
                "--direccion",
                Math.random()*2-1
            );

            document.body.appendChild(
                corazon
            );

            setTimeout(()=>{
                corazon.remove();
            },3000);

        },i*60);
    }
}

// ESTRELLAS DE FONDO

function crearEstrella(){

    const estrella =
    document.createElement("div");

    estrella.className="estrella";

    estrella.style.left =
    Math.random()*100+"%";

    document.body.appendChild(
        estrella
    );

    setTimeout(()=>{
        estrella.remove();
    },5000);
}

setInterval(crearEstrella,180);

</script>

</body>
</html>
